<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>슬롯 관리 | Nine</title>
  <link rel="stylesheet" href="css/admin-pages.css?v=20260715-mobile-hamburger">
</head>
<body data-admin-page="slots">
  <aside class="admin-sidebar" data-admin-sidebar></aside>
  <main class="admin-main admin-page">
    <header class="page-header">
      <div><h2>슬롯 관리</h2><p>커미션 접수 상태와 최대·찬 슬롯 수를 관리합니다.</p></div>
      <button class="admin-button primary" data-save-slots>변경사항 저장</button>
    </header>
    <div class="settings-grid settings-grid-single">
      <section class="content-card settings-section">
        <h3>커미션 슬롯 설정</h3>
        <div class="field"><label for="status">접수 상태</label><select id="status"><option value="접수중">접수중</option><option value="준비중">준비중</option><option value="휴식중">휴식중</option></select></div>
        <div class="field"><label for="slots">최대 슬롯 수</label><input id="slots" type="number" min="0" placeholder="받을 수 있는 최대 개수"></div>
        <div class="field"><label for="used">찬 슬롯 수</label><input id="used" type="number" min="0" placeholder="현재 신청이 찬 개수"></div>
        <div class="field"><label for="period">평균 작업 기간</label><input id="period" placeholder="예: 5 ~ 7일"></div>
      </section>
    </div>
  </main>
  <div class="toast" data-toast></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-app.js?v=20260715-mobile-hamburger"></script>
  <script src="js/admin-pages.js?v=20260715-mobile-hamburger"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-data.js"></script>
</body>
</html>
