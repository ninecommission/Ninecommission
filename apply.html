<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>커미션 신청 | NINE Commission</title>
  <link rel="stylesheet" href="css/styles.css?v=20260715-mobile" />
  <link rel="stylesheet" href="css/apply.css?v=20260715-mobile" />
</head>
<body>
  <main class="layout">
    <section class="main-column">
      <section class="page-panel unified-title-panel">
        <header class="page-title">
          <h1>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3 9.7 9.7 3 12l6.7 2.3L12 21l2.3-6.7L21 12l-6.7-2.3z"></path>
            </svg>
            커미션 신청
          </h1>
          <p>신청 전 안내를 확인하고 아래 항목에 맞춰 자료를 보내주세요.</p>
        </header>
      </section>
      <section class="page-panel apply-form-panel">
        <ul class="apply-notice-box">
          <li>신청 전 안내사항을 꼭 확인해주세요.</li>
          <li>작업 기간 : 최대 7~21일</li>
          <li>신청서를 검토 후 수락 여부를 안내드립니다.</li>
        </ul>
        <form class="commission-apply-form" data-supabase-form="commission">
          <label>
            이름 / 닉네임
            <input type="text" name="name" placeholder="이름 / 닉네임" required />
          </label>
          <label>
            이메일
            <input type="email" name="email" placeholder="이메일 (답변 받을 주소)" required />
          </label>
          <label>
            신청 인원 수
            <input type="text" name="people" placeholder="예: 1인" />
          </label>
          <label>
            사용 용도
            <input type="text" name="usage" placeholder="개인소장 / 방송 / 굿즈 등" />
          </label>
          <label>
            신청 타입
            <select name="type" required>
              <option value="">신청 타입을 선택해주세요</option>
              <option value="SD">SD</option>
              <option value="LD">LD</option>
              <option value="background">배경 추가</option>
              <option value="design">디자인 추가</option>
            </select>
          </label>
          <label class="upload-box">
            <input type="file" name="reference" accept="image/*" multiple />
            <span aria-hidden="true">▧</span>
            <strong>참고 이미지 업로드</strong>
            <small data-reference-count>선택된 이미지 없음 · 여러 번 나누어 선택 가능</small>
          </label>
          <label>
            내용
            <textarea name="message" rows="8" placeholder="캐릭터 설정, 외형 설명, 성격, 포즈, 분위기 등을 작성해주세요." required></textarea>
          </label>
          <label class="agree-row">
            <input type="checkbox" name="agree" required />
            신청 내용을 확인했으며 커미션 안내 사항에 동의합니다.
          </label>
          <button class="primary-button" type="submit">커미션 신청하기</button>
        </form>
      </section>
    </section>
    <aside class="side-column">
      <section class="profile-card"><div class="profile-top"><div class="avatar"></div><div><h2>NINE</h2></div></div><nav class="side-menu" aria-label="주요 메뉴"><a href="index.html"><span><svg viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"></path><path d="M5 10v10h14V10"></path><path d="M9 20v-6h6v6"></path></svg></span>홈</a><a href="gallery.html"><span><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="8.5" cy="10.5" r="1.5"></circle><path d="m21 15-5-5L5 19"></path></svg></span>갤러리</a><a href="guide.html"><span><svg viewBox="0 0 24 24"><path d="M10.3 21a2 2 0 0 0 3.4 0"></path><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path></svg></span>커미션 안내</a><a href="notice.html"><span><svg viewBox="0 0 24 24"><path d="m3 11 18-5v12L3 13z"></path><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path></svg></span>공지사항</a><a class="active" href="apply.html"><span><svg viewBox="0 0 24 24"><path d="M9 5h6"></path><path d="M9 3h6v4H9z"></path><path d="M5 5h14v16H5z"></path><path d="M8 12h8"></path><path d="M8 16h5"></path></svg></span>커미션 신청</a><a href="contact.html"><span><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg></span>문의하기</a></nav></section>
      <section class="status-card"><div class="status-top"><h2>커미션 슬롯</h2><span>-</span></div><strong>0 / 0</strong><div class="progress"><span></span></div><p>평균 작업 기간 <b>-</b></p></section>
      <section class="contact-card"><div class="contact-links" aria-label="연락 수단"><a href="https://mail.google.com/mail/?view=cm&fs=1&to=nine9commission@gmail.com&su=커미션 문의" target="_blank" rel="noopener" aria-label="메일"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg></a><a href="https://open.kakao.com/me/commi9nine" target="_blank" rel="noopener" aria-label="카카오톡"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.3 9.4 9.4 0 0 1-3.4-.6L3 21l1.8-4.5A7.7 7.7 0 0 1 3 11.5a8.5 8.5 0 0 1 9-8.3 8.5 8.5 0 0 1 9 8.3"></path></svg></a></div><a class="primary-button" href="apply.html">커미션 신청하기</a><a class="secondary-button" href="status.html">진행 상황 조회</a></section>
    </aside>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-app.js?v=20260714-rest"></script>
  <script src="chat.js?v=20260712-reset"></script>
</body>
</html>
