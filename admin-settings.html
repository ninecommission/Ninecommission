<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>설정 | Nine</title>
  <link rel="stylesheet" href="css/admin-pages.css?v=20260715-clear-left">
</head>
<body data-admin-page="settings">
  <aside class="admin-sidebar" data-admin-sidebar></aside>
  <main class="admin-main admin-page">
    <header class="page-header">
      <div><h2>설정</h2><p>홈페이지 프로필과 상태 조회 옵션을 설정합니다.</p></div>
      <button class="admin-button primary" data-save-settings>변경사항 저장</button>
    </header>
    <div class="settings-grid settings-grid-single">
      <section class="content-card settings-section">
        <h3>홈페이지 설정</h3>
        <div class="field profile-image-field">
          <label for="profile-image">프로필 사진</label>
          <div class="profile-image-control">
            <div class="profile-image-preview" data-profile-preview aria-hidden="true"></div>
            <input id="profile-image" type="file" accept="image/*" data-profile-image>
          </div>
          <div class="profile-adjust-grid">
            <label>크기 <output data-profile-scale-value>100%</output><input type="range" min="70" max="140" value="100" data-profile-scale></label>
            <label>가로 위치 <output data-profile-x-value>50%</output><input type="range" min="0" max="100" value="50" data-profile-x></label>
            <label>세로 위치 <output data-profile-y-value>50%</output><input type="range" min="0" max="100" value="50" data-profile-y></label>
          </div>
          <small>관리자 페이지와 홈페이지에 동일하게 표시됩니다.</small>
        </div>
        <div class="switch-row"><div><strong>상태 조회 사용</strong><p>홈페이지에서 신청 진행 상태를 조회할 수 있습니다.</p></div><button class="switch on" aria-pressed="true" aria-label="상태 조회 사용" data-status-lookup-enabled></button></div>
      </section>
    </div>
  </main>
  <div class="toast" data-toast></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-app.js?v=20260716-inquiry-history"></script>
  <script src="js/admin-pages.js?v=20260715-mobile-chat-header-14"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-data.js?v=20260716-inquiry-history"></script>
</body>
</html>
