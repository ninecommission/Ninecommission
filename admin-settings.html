<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>설정 | Nine Admin</title>
  <link rel="stylesheet" href="css/admin-pages.css">
</head>
<body data-admin-page="settings">
  <aside class="admin-sidebar" data-admin-sidebar></aside>
  <main class="admin-main admin-page">
    <header class="page-header">
      <div><h2>설정</h2><p>커미션 운영 정보와 홈페이지 노출 옵션을 설정합니다.</p></div>
      <button class="admin-button primary" data-notify="설정을 저장했습니다.">변경사항 저장</button>
    </header>
    <div class="settings-grid">
      <section class="content-card settings-section">
        <h3>커미션 운영 설정</h3>
        <div class="field"><label for="status">접수 상태</label><select id="status"><option value="" selected>상태 선택</option><option>OPEN</option><option>CLOSED</option><option>REST</option></select></div>
        <div class="field"><label for="slots">전체 슬롯</label><input id="slots" type="number" min="0" placeholder="슬롯 수 입력"></div>
        <div class="field"><label for="used">사용 중인 슬롯</label><input id="used" type="number" min="0" placeholder="사용 슬롯 입력"></div>
        <div class="field"><label for="period">평균 작업 기간</label><input id="period" placeholder="예: 5 ~ 7일"></div>
      </section>
      <section class="content-card settings-section">
        <h3>홈페이지 설정</h3>
        <div class="switch-row"><div><strong>신청 버튼 노출</strong><p>홈페이지에 신청 버튼을 표시합니다.</p></div><button class="switch" aria-pressed="false" aria-label="신청 버튼 노출"></button></div>
        <div class="switch-row"><div><strong>채팅 문의 사용</strong><p>방문자가 채팅 버튼을 눌러 문의할 수 있습니다.</p></div><button class="switch" aria-pressed="false" aria-label="채팅 문의 사용"></button></div>
        <div class="switch-row"><div><strong>상태 조회 사용</strong><p>신청 번호로 진행 상태를 조회합니다.</p></div><button class="switch" aria-pressed="false" aria-label="상태 조회 사용"></button></div>
        <div class="field"><label for="message">안내 메시지</label><textarea id="message" placeholder="홈페이지에 표시할 안내 메시지를 입력하세요."></textarea></div>
      </section>
    </div>
  </main>
  <div class="toast" data-toast></div>
  <script src="js/admin-pages.js"></script>
</body>
</html>
