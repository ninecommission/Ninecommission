<!doctype html>
<html lang="ko">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>진행 상황 조회 | NINE Commission</title><link rel="stylesheet" href="css/styles.css?v=20260715-mobile-chat-text-16" /><link rel="stylesheet" href="css/status.css?v=20260715-mobile-chat-text-16" /></head>
<body>
  <main class="layout">
    <section class="main-column">
      <section class="page-panel"><header class="page-title"><h1>진행 상황 조회</h1><p>신청 번호와 신청할 때 입력한 이메일로 작업 상태를 확인할 수 있습니다.</p></header></section>
      <section class="page-panel status-lookup-panel">
        <form class="status-lookup-form" data-status-lookup-form>
          <label>신청 번호<input name="request_id" type="number" min="1" inputmode="numeric" placeholder="예: 123" required></label>
          <label>신청 이메일<input name="email" type="email" placeholder="신청할 때 입력한 이메일" required></label>
          <button class="primary-button" type="submit">상태 조회</button>
        </form>
        <p class="status-lookup-message" data-status-lookup-message aria-live="polite"></p>
        <article class="status-result" data-status-lookup-result hidden>
          <div><span>신청 번호</span><strong data-status-result-id></strong></div>
          <div><span>신청 타입</span><strong data-status-result-type></strong></div>
          <div><span>현재 상태</span><strong data-status-result-status></strong></div>
          <div><span>신청일</span><strong data-status-result-date></strong></div>
        </article>
      </section>
    </section>
    <aside class="side-column">

      <section class="status-card"><div class="status-top"><h2>커미션 슬롯</h2><span>-</span></div><strong>0 / 0</strong><div class="progress"><span></span></div></section>
      <section class="contact-card"><div class="contact-links" aria-label="연락 수단"><a href="https://mail.google.com/mail/?view=cm&fs=1&to=nine9commission@gmail.com&su=커미션 문의" target="_blank" rel="noopener" aria-label="메일"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg></a><a href="https://open.kakao.com/me/commi9nine" target="_blank" rel="noopener" aria-label="카카오톡"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.3 9.4 9.4 0 0 1-3.4-.6L3 21l1.8-4.5A7.7 7.7 0 0 1 3 11.5a8.5 8.5 0 0 1 9-8.3 8.5 8.5 0 0 1 9 8.3"></path></svg></a></div><a class="primary-button" href="apply.html">커미션 신청하기</a><a class="secondary-button" href="status.html">진행 상황 조회</a></section>
    </aside>
  </main>
